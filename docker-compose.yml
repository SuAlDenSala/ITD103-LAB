version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: itd103_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15
    container_name: itd103_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
    name: itd103_mongodb_data
  neo4j_data:
    name: itd103_neo4j_data
